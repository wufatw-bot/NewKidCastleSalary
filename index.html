<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>吉的堡同安莊敬校員工薪資系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #faf6ee;
      --warm: #e8dcc8;
      --brown: #8b6f47;
      --text-dark: #2c2018;
      --text-mid: #5a4a35;
      --text-light: #8a7560;
      --gold: #c9922a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    .nav {
      background: linear-gradient(90deg, #6b4f2e 0%, #8b6f47 50%, #6b4f2e 100%);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      box-shadow: 0 3px 12px rgba(0,0,0,0.25);
      flex-shrink: 0;
    }
    .nav-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px;
      font-weight: 700;
      color: #fef3dc;
      letter-spacing: 2px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }
    .divider {
      width: 100%;
      height: 14px;
      background: repeating-linear-gradient(90deg, #c9a96e 0px, #c9a96e 8px, #e8d5b0 8px, #e8d5b0 16px);
      flex-shrink: 0;
    }
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(90,158,111,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(201,146,42,0.08) 0%, transparent 50%),
        var(--cream);
    }
    .cards {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
      width: 100%;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px 32px;
      box-shadow: 0 0 0 3px #c9a96e, 0 0 0 5px #e8d5b0, 0 12px 40px rgba(0,0,0,0.13);
      flex: 1;
      min-width: 240px;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
      position: relative;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 0 3px #c9922a, 0 0 0 5px #e8d5b0, 0 20px 50px rgba(0,0,0,0.18);
    }
    .card-deco {
      position: absolute;
      top: -16px; left: 50%; transform: translateX(-50%);
      background: var(--warm);
      border: 2px solid #c9a96e;
      border-radius: 999px;
      padding: 5px 20px;
      font-size: 13px;
      font-weight: 700;
      color: var(--brown);
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .card-icon { font-size: 56px; }
    .card-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: 2px;
    }
    .card-desc {
      font-size: 14px;
      color: var(--text-light);
      text-align: center;
      line-height: 1.9;
    }
    .card-btn {
      margin-top: 8px;
      padding: 12px 32px;
      border: none;
      border-radius: 10px;
      font-family: 'Noto Serif TC', serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      color: #fef3dc;
      transition: opacity .2s;
    }
    .card-btn:hover { opacity: 0.85; }
    .btn-ta { background: linear-gradient(135deg, #2a6040 0%, #3d8258 100%); }
    .btn-zj { background: linear-gradient(135deg, #7c2d12 0%, #a84332 100%); }
    .footer {
      text-align: center;
      padding: 12px;
      font-size: 13px;
      color: var(--text-light);
      letter-spacing: 1px;
    }
    @media (max-width: 560px) {
      .cards { flex-direction: column; align-items: center; }
      .card { max-width: 100%; }
      .nav-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <span class="nav-title">🏯 吉的堡同安莊敬校員工薪資系統</span>
  </nav>
  <div class="divider"></div>
  <div class="main">
    <div class="cards">
      <a class="card" href="tongan.html">
        <div class="card-deco">🌿 同安校</div>
        <div class="card-icon">🌿</div>
        <div class="card-title">同安校</div>
        <div class="card-desc">員工每月工作輸入<br>管理員後台系統</div>
        <button class="card-btn btn-ta">進 入 同 安 校</button>
      </a>
      <a class="card" href="zhuangjing.html">
        <div class="card-deco">🏮 莊敬校</div>
        <div class="card-icon">🏮</div>
        <div class="card-title">莊敬校</div>
        <div class="card-desc">員工每月工作輸入<br>管理員後台系統</div>
        <button class="card-btn btn-zj">進 入 莊 敬 校</button>
      </a>
    </div>
  </div>
  <div class="footer">© 吉的堡托育機構 ・ 員工薪資系統</div>
</body>
</html>
