<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>獎金與加班資料填報</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --purple: #4A3F8F;
    --purple-light: #6B5FBB;
    --blue-btn: #3B6FE8;
    --bg: #F4F3FA;
    --card: #FFFFFF;
    --text: #2D2A4A;
    --muted: #8A87A8;
    --red: #E86060;
    --green: #4CAF82;
    --border: #E2E0F0;
    --shadow: 0 4px 24px rgba(74,63,143,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 32px 16px 48px;
    color: var(--text);
  }

  .page-wrapper {
    max-width: 1200px;
    margin: 0 auto;
    background: #fff;
    border-radius: 20px;
    border: 2px solid var(--gold);
    box-shadow: 0 8px 48px rgba(201,168,76,0.15);
    padding: 40px 36px 48px;
    position: relative;
    overflow: hidden;
  }

  .page-wrapper::before, .page-wrapper::after {
    content: '';
    position: absolute;
    width: 60px; height: 60px;
    border-color: var(--gold);
    border-style: solid;
  }
  .page-wrapper::before { top: 12px; right: 12px; border-width: 0 2px 0 0; border-top: 2px solid var(--gold); }
  .page-wrapper::after  { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }

  .header { text-align: center; margin-bottom: 36px; }
  .header .icon { font-size: 2.4rem; margin-bottom: 8px; }
  .header h1 { font-size: 1.9rem; font-weight: 700; color: var(--purple); letter-spacing: 2px; }
  .header p  { font-size: 0.88rem; color: var(--muted); margin-top: 6px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 24px;
  }

  @media (max-width: 960px) { .grid { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border-radius: 16px;
    border: 1.5px solid var(--border);
    padding: 24px 20px;
    box-shadow: var(--shadow);
  }

  .card-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--purple);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1.5px solid var(--border);
  }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .field label .required { color: var(--red); margin-left: 2px; }
  .field label .rate {
    color: var(--green);
    font-size: 0.78rem;
    margin-left: 6px;
    font-weight: 600;
  }
  .field label .deduct {
    color: var(--red);
    font-size: 0.78rem;
    margin-left: 6px;
    font-weight: 600;
  }

  select, input[type="text"], input[type="month"], input[type="number"] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 0.92rem;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    background: #FAFAFE;
    transition: border 0.2s, box-shadow 0.2s;
    outline: none;
    -webkit-appearance: none;
  }
  select:focus, input:focus {
    border-color: var(--purple-light);
    box-shadow: 0 0 0 3px rgba(107,95,187,0.12);
  }

  .hint {
    font-size: 0.76rem;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.7;
  }

  .total-box {
    background: linear-gradient(135deg, #FFF5E0 0%, #FFE9C8 100%);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    margin-top: 8px;
  }
  .total-box .label { font-size: 0.82rem; color: var(--gold); font-weight: 600; margin-bottom: 6px; }
  .total-box .amount { font-size: 2.4rem; font-weight: 700; color: var(--purple); line-height: 1; }
  .total-box .unit   { font-size: 1rem; color: var(--muted); margin-left: 4px; }

  .btn-row { margin-top: 8px; }
  .btn-preview {
    width: 100%;
    padding: 18px;
    background: linear-gradient(90deg, #3B6FE8 0%, #5B4FD8 100%);
    color: #fff;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 3px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .btn-preview:hover { opacity: 0.92; transform: translateY(-1px); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(30,20,70,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 36px 32px;
    max-width: 520px;
    width: 100%;
    box-shadow: 0 16px 64px rgba(74,63,143,0.22);
  }
  .modal h2 { font-size: 1.3rem; color: var(--purple); margin-bottom: 20px; font-weight: 700; }
  .modal-row {
    display: flex; justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.92rem;
  }
  .modal-row .k { color: var(--muted); }
  .modal-row .v { font-weight: 600; color: var(--text); }
  .modal-total {
    margin-top: 16px;
    background: linear-gradient(135deg, #FFF5E0, #FFE9C8);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-total .k { font-size: 1rem; font-weight: 600; color: var(--gold); }
  .modal-total .v { font-size: 1.8rem; font-weight: 700; color: var(--purple); }
  .modal-btns { display: flex; gap: 12px; margin-top: 20px; }
  .modal-btns button {
    flex: 1; padding: 12px;
    border-radius: 10px; border: none;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: opacity 0.2s;
  }
  .btn-cancel { background: var(--bg); color: var(--muted); }
  .btn-submit { background: linear-gradient(90deg,#3B6FE8,#5B4FD8); color: #fff; }
  .btn-submit:hover, .btn-cancel:hover { opacity: 0.85; }

  .loading-text { color: var(--muted); font-size: 0.85rem; padding: 6px 0; }

  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #2D2A4A; color: #fff;
    padding: 12px 28px; border-radius: 30px;
    font-size: 0.9rem; font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="page-wrapper">
  <div class="header">
    <div class="icon">📋</div>
    <h1>獎金與加班資料填報</h1>
    <p>吉的堡莊敬校 ｜ 請確實填寫本月相關資料，每人每月僅限提交一次</p>
  </div>

  <div class="grid">
    <!-- 基本資料 -->
    <div class="card">
      <div class="card-title">👤 基本資料</div>
      <div class="field">
        <label>姓名 <span class="required">*</span></label>
        <select id="name">
          <option value="">載入中...</option>
        </select>
      </div>
      <div class="field">
        <label>月份 <span class="required">*</span></label>
        <input type="month" id="month" value="">
      </div>
      <div class="total-box">
        <div class="label">💰 本月總獎金</div>
        <div class="amount" id="total">0</div><span class="unit">元</span>
      </div>
    </div>

    <!-- 出勤資料 -->
    <div class="card">
      <div class="card-title">⏰ 出勤資料</div>
      <div class="field">
        <label>加班時數 <span class="rate">$170 / 小時</span></label>
        <input type="number" id="overtime" min="0" value="0">
      </div>
      <div class="field">
        <label>安親人數</label>
        <input type="number" id="afterschool" min="0" value="0">
        <div class="hint">15人以下：無津貼<br>16－20人：$500/人<br>21人以上：$1000/人</div>
      </div>
      <div class="field">
        <label>混校人數</label>
        <input type="number" id="mixed" min="0" value="0">
      </div>
    </div>

    <!-- 請假資料 -->
    <div class="card">
      <div class="card-title">📅 請假資料</div>
      <div class="field">
        <label>事假時數 <span class="deduct">扣 $120 / 小時</span></label>
        <input type="number" id="personal_leave" min="0" value="0">
      </div>
      <div class="field">
        <label>病假時數 <span class="deduct">扣 $60 / 小時</span></label>
        <input type="number" id="sick_leave" min="0" value="0">
      </div>
    </div>

    <!-- 獎金資料 -->
    <div class="card">
      <div class="card-title">🎁 獎金資料</div>
      <div class="field">
        <label>預繳獎金</label>
        <input type="number" id="prepaid" min="0" value="0">
      </div>
      <div class="field">
        <label>考試獎金</label>
        <input type="number" id="exam_bonus" min="0" value="0">
      </div>
      <div class="field">
        <label>其他獎金</label>
        <input type="number" id="other_bonus" min="0" value="0">
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-preview" onclick="openPreview()">預覽資料</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>📋 資料預覽</h2>
    <div id="modal-content"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">返回修改</button>
      <button class="btn-submit" onclick="submitForm()">確認提交</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Set default month
const today = new Date();
document.getElementById('month').value = today.toISOString().slice(0,7);

// Fetch names from Google Sheet (published CSV — supports CORS)
// URL format: /pub?output=csv using the "e/..." published ID
const PUBLISHED_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgL7mlWIHQD9Yu7oRyegwxndx-g1D4kJnY-wS0HAm1JpMK1BezydfW9xGjqZ8ksYE4i8NtqfPQPQcf/pub';
const CSV_URL = `${PUBLISHED_BASE}?gid=0&single=true&output=csv`;

function parseCSVRow(row) {
  row = row.replace(/\r$/, '');
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') {
      if (inQ && row[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else cur += ch;
  }
  result.push(cur.trim());
  return result;
}

async function loadNames() {
  const sel = document.getElementById('name');
  sel.innerHTML = '<option value="">載入中...</option>';
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();

    const lines = text.trim().split('\n').filter(l => l.trim());
    const header = parseCSVRow(lines[0]);

    // Find column whose header contains "姓名" (handles "A 姓名" etc.)
    let nameCol = header.findIndex(h => h.includes('姓名'));
    if (nameCol < 0) nameCol = 0;

    const names = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = parseCSVRow(lines[i]);
      const n = (cols[nameCol] || '').trim();
      if (n) names.push(n);
    }

    if (names.length === 0) throw new Error('試算表中找不到姓名資料');

    sel.innerHTML = '<option value="">請選擇姓名</option>';
    names.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      sel.appendChild(opt);
    });
  } catch(e) {
    sel.innerHTML = '<option value="">⚠ 無法載入姓名</option>';
    console.warn('載入姓名失敗：', e.message);
    const field = sel.closest('.field');
    if (field && !field.querySelector('.load-err')) {
      const hint = document.createElement('div');
      hint.className = 'load-err';
      hint.style.cssText = 'font-size:0.75rem;color:#E86060;margin-top:4px;';
      hint.textContent = '⚠ ' + e.message;
      field.appendChild(hint);
    }
  }
}
loadNames();

// Calculation
function calcTotal() {
  const overtime = +document.getElementById('overtime').value || 0;
  const afterschool = +document.getElementById('afterschool').value || 0;
  const mixed = +document.getElementById('mixed').value || 0;
  const personal = +document.getElementById('personal_leave').value || 0;
  const sick = +document.getElementById('sick_leave').value || 0;
  const prepaid = +document.getElementById('prepaid').value || 0;
  const exam = +document.getElementById('exam_bonus').value || 0;
  const other = +document.getElementById('other_bonus').value || 0;

  const overtimePay = overtime * 170;
  let afterschoolPay = 0;
  if (afterschool >= 21) afterschoolPay = afterschool * 1000;
  else if (afterschool >= 16) afterschoolPay = afterschool * 500;

  const total = overtimePay + afterschoolPay + prepaid + exam + other
              - personal * 120 - sick * 60;

  document.getElementById('total').textContent = total.toLocaleString();
  return total;
}

document.querySelectorAll('input[type="number"]').forEach(el => el.addEventListener('input', calcTotal));

function openPreview() {
  const name  = document.getElementById('name').value;
  const month = document.getElementById('month').value;
  if (!name)  { showToast('請選擇姓名'); return; }
  if (!month) { showToast('請選擇月份'); return; }

  const overtime   = +document.getElementById('overtime').value||0;
  const afterschool= +document.getElementById('afterschool').value||0;
  const mixed      = +document.getElementById('mixed').value||0;
  const personal   = +document.getElementById('personal_leave').value||0;
  const sick       = +document.getElementById('sick_leave').value||0;
  const prepaid    = +document.getElementById('prepaid').value||0;
  const exam       = +document.getElementById('exam_bonus').value||0;
  const other      = +document.getElementById('other_bonus').value||0;
  const total      = calcTotal();

  const rows = [
    ['姓名', name], ['月份', month],
    ['加班時數', `${overtime} 小時 (+${(overtime*170).toLocaleString()})`],
    ['安親人數', `${afterschool} 人`],
    ['混校人數', `${mixed} 人`],
    ['事假時數', `${personal} 小時 (-${(personal*120).toLocaleString()})`],
    ['病假時數',  `${sick} 小時 (-${(sick*60).toLocaleString()})`],
    ['預繳獎金', `$${prepaid.toLocaleString()}`],
    ['考試獎金', `$${exam.toLocaleString()}`],
    ['其他獎金', `$${other.toLocaleString()}`],
  ];

  const html = rows.map(([k,v]) =>
    `<div class="modal-row"><span class="k">${k}</span><span class="v">${v}</span></div>`
  ).join('') +
  `<div class="modal-total"><span class="k">💰 本月總獎金</span><span class="v">${total.toLocaleString()} 元</span></div>`;

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function submitForm() {
  closeModal();
  showToast('✅ 資料已成功提交！');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
